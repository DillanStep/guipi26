name: Feature request
description: Suggest a new control, API, or capability.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Optional. Sketch out what the call site might look like.
      render: python

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
